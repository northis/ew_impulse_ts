<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EW v2 Markup Replay</title>
  <link rel="stylesheet" href="/css/replay.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div id="topbar">
    <label>CSV:</label>
    <select id="selFile"><option>-- loading files... --</option></select>
    <label>From:</label>
    <input type="text" id="inpFromDate" placeholder="dd.mm.yyyy" maxlength="10" inputmode="numeric" autocomplete="off">
    <label>To:</label>
    <input type="text" id="inpToDate" placeholder="dd.mm.yyyy" maxlength="10" inputmode="numeric" autocomplete="off">
    <button id="btnFull" title="Reset to full range">↔ Full</button>
    <span id="rangeInfo"></span>
    <label>Dead:</label><input type="number" id="inpDead" value="1" min="0" max="3" style="width:44px">
    <button id="btnLoad">⏎ Load</button>
    <span class="ctrl-sep"></span>
    <button id="btnPlay" title="Play / pause continuous analysis" disabled>▶ Play</button>
    <button id="btnStep" title="Analyse one zigzag segment" disabled>⏭ Step</button>
    <span class="ctrl-sep"></span>
    <button id="btnDownload" title="Download current tree snapshot as JSON" disabled style="background:#2a5a2a;border-color:#3a7a3a">📥 JSON</button>
    <span id="status">Ready</span>
  </div>

  <!-- Main area -->
  <div id="main">
    <div id="chartContainer"></div>
    <div id="treePanel">
      <h4>📋 Nodes — Bar <span id="treeBarLabel">0</span></h4>
      <div id="nodeList"><em style="color:#666;padding:12px">Load a file, then Step / Play</em></div>
    </div>
  </div>

  <!-- Progress bar (position in date range — not interactive) -->
  <div id="playback">
    <span id="stepCounter">0 / 0</span>
    <progress id="progress" max="100" value="0"></progress>
    <span id="barDate">—</span>
  </div>
</div>

<script src="/js/chart.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
